# PostgreSQL for icu_decision (no MIMIC data; restore Layer1 from dumps/)
# Default port 5433 to avoid conflict with host PG on 5432
services:
  postgres:
    image: postgres:16
    container_name: icu_decision_pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${PG_PORT:-5433}:5432"
    volumes:
      - icu_decision_pg_data:/var/lib/postgresql/data
      - ./scripts/init_databases_p0.sql:/docker-entrypoint-initdb.d/01_init_p0.sql:ro
      - ./scripts/docker_init_mock.sh:/docker-entrypoint-initdb.d/02_mock.sh:ro
      - ./scripts/mock_schema_decision.sql:/scripts/mock_schema_decision.sql:ro
      - ./dumps:/dumps

volumes:
  icu_decision_pg_data:
